<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightning Timer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f8;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
        background: linear-gradient(135deg, #f8fafc, #eef2ff);
        position: relative;
      }

      .app {
        width: min(100%, 36rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 3vw, 2.3rem);
      }

      #circle {
        width: 12rem;
        height: 12rem;
        border-radius: 50%;
        background: #ef4444;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        transition: background-color 0.15s ease;
      }

      #circle.green {
        background: #22c55e;
      }

      #panel {
        min-height: 8rem;
        width: 100%;
        text-align: center;
      }

      button,
      input,
      select {
        font: inherit;
        padding: 0.6rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid #d1d5db;
      }

      button {
        background: #111827;
        color: white;
        cursor: pointer;
        border: none;
      }

      button:hover {
        background: #374151;
      }

      input,
      select {
        width: 100%;
        max-width: 14rem;
        text-align: center;
      }

      form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .buttonRow {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .rules {
        max-width: 28rem;
        margin: 0 auto;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #4b5563;
      }

      .muted {
        color: #6b7280;
      }

    </style>
  </head>
  <body>
    <main class="app">
      <h1>Lightning Timer</h1>
      <div id="circle" aria-live="polite"></div>
      <div id="panel"></div>
    </main>

    <script>
      const circle = document.getElementById("circle");
      const panel = document.getElementById("panel");
      let actual = 0;
      let mode = "1player";

      function closeness(d) {
        if (d < 0.1) return "Incredible!";
        if (d < 0.3) return "Very close!";
        if (d < 0.7) return "Not bad.";
        if (d < 1.5) return "You can do better.";
        return "Way off!";
      }

      function showIdle() {
        panel.innerHTML = `
          <form id="modeForm">
            <label for="modeSelect">Game mode</label>
            <select id="modeSelect">
              <option value="1player" ${mode === "1player" ? "selected" : ""}>1 Player</option>
              <option value="2player" ${mode === "2player" ? "selected" : ""}>2 Player</option>
              <option value="hardmode" ${mode === "hardmode" ? "selected" : ""}>Hard Mode</option>
              <option value="2playerhardmode" ${mode === "2playerhardmode" ? "selected" : ""}>2 Player Hard Mode</option>
            </select>
            <button id="startBtn" type="button">Start</button>
          </form>
          <p class="rules">Watch the circle turn green, then estimate how long it stayed green. In 2-player mode, both players submit guesses and the closest one wins. Hard modes use green durations with two decimal places.</p>`;

        document.getElementById("modeSelect").onchange = (e) => {
          mode = e.target.value;
        };
        document.getElementById("startBtn").onclick = start;
      }

      function start() {
        mode = document.getElementById("modeSelect")?.value || mode;
        panel.innerHTML = '<p class="muted">Get ready... watch the circle.</p>';

        const waitMs = 800 + Math.random() * 1500;
        setTimeout(() => {
          const greenSeconds = 1 + Math.random() * 4;
          const roundedSeconds = mode === "hardmode" || mode === "2playerhardmode"
            ? Number(greenSeconds.toFixed(2))
            : Math.round(greenSeconds * 10) / 10;
          const t0 = performance.now();
          circle.classList.add("green");
          panel.innerHTML = '<p class="muted">Count the seconds!</p>';

          setTimeout(() => {
            actual = roundedSeconds;
            circle.classList.remove("green");
            showGuess();
          }, roundedSeconds * 1000);
        }, waitMs);
      }

      function showGuess() {
        if (mode === "2player" || mode === "2playerhardmode") {
          panel.innerHTML = `
            <form id="guessForm">
              <label>Player 1 guess (seconds)</label>
              <input id="player1Guess" type="number" step="0.01" autofocus />
              <label>Player 2 guess (seconds)</label>
              <input id="player2Guess" type="number" step="0.01" />
              <button type="submit">Submit guesses</button>
            </form>`;

          document.getElementById("guessForm").onsubmit = (e) => {
            e.preventDefault();
            const p1 = parseFloat(document.getElementById("player1Guess").value);
            const p2 = parseFloat(document.getElementById("player2Guess").value);
            if (isNaN(p1) || isNaN(p2)) return;
            showTwoPlayerResult(p1, p2);
          };
          return;
        }

        panel.innerHTML = `
          <form id="guessForm">
            <label>How long was it green (seconds)?</label>
            <input id="guess" type="number" step="0.01" autofocus />
            <button type="submit">Submit</button>
          </form>`;

        document.getElementById("guessForm").onsubmit = (e) => {
          e.preventDefault();
          const g = parseFloat(document.getElementById("guess").value);
          if (isNaN(g)) return;
          showResult(Math.abs(g - actual));
        };
      }

      function showResult(diff) {
        panel.innerHTML = `
          <p>Actual: <strong>${actual.toFixed(2)}s</strong></p>
          <p>You were off by <strong>${diff.toFixed(2)}s</strong></p>
          <p class="muted">${closeness(diff)}</p>
          <div class="buttonRow">
            <button id="again">Play again</button>
            <button id="home" type="button">Return home</button>
          </div>`;

        document.getElementById("again").onclick = start;
        document.getElementById("home").onclick = showIdle;
      }

      function showTwoPlayerResult(p1, p2) {
        const diff1 = Math.abs(p1 - actual);
        const diff2 = Math.abs(p2 - actual);
        let winnerText = "It's a tie!";

        if (diff1 < diff2) {
          winnerText = "Player 1 wins!";
        } else if (diff2 < diff1) {
          winnerText = "Player 2 wins!";
        }

        panel.innerHTML = `
          <p>Actual: <strong>${actual.toFixed(2)}s</strong></p>
          <p>Player 1 was off by <strong>${diff1.toFixed(2)}s</strong> (${closeness(diff1)})</p>
          <p>Player 2 was off by <strong>${diff2.toFixed(2)}s</strong> (${closeness(diff2)})</p>
          <p><strong>${winnerText}</strong></p>
          <div class="buttonRow">
            <button id="again">Play again</button>
            <button id="home" type="button">Return home</button>
          </div>`;

        document.getElementById("again").onclick = start;
        document.getElementById("home").onclick = showIdle;
      }

      showIdle();
    </script>
  </body>
</html>
